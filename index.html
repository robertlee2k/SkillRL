<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>SkillRL Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 4px solid #3b82f6; color: white; background: #1e293b; }
        .screen-box { font-family: monospace; white-space: pre-wrap; font-size: 11px; line-height: 1.4; }
    </style>
</head>
<body class="bg-black text-gray-200 h-screen flex flex-col overflow-hidden">
    <header class="p-4 bg-gray-900 border-b border-gray-800 flex justify-between items-center shadow-xl">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 px-3 py-1 rounded font-black tracking-widest text-white">ARENA</div>
            <h1 id="status-bar" class="text-[10px] font-mono text-gray-400 uppercase">Ready. Waiting to launch...</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex bg-gray-800 rounded p-1 mr-4">
                <button id="mode-live" class="px-4 py-1 text-xs font-bold active-tab">LIVE</button>
                <button id="mode-review" class="px-4 py-1 text-xs font-bold text-gray-500 hover:text-white">REVIEW</button>
            </div>
            <label class="text-[10px] font-bold text-gray-400 border border-gray-700 rounded px-2 py-1"><input type="checkbox" id="filter-fail"> SHOW FAILURES</label>
            <div class="flex gap-2 bg-gray-800 px-2 py-1 rounded">
                <button id="prev-btn" class="text-blue-500 disabled:opacity-30">◀</button>
                <span id="page-info" class="text-[10px] font-mono self-center">TASK 0/0</span>
                <button id="next-btn" class="text-blue-500 disabled:opacity-30">▶</button>
            </div>
            <div class="flex bg-gray-800 rounded px-2 py-1 items-center gap-2">
                <span class="text-[10px] font-bold text-gray-400">BATCH:</span>
                <input type="number" id="num-tasks" value="10" class="w-10 bg-transparent text-white font-bold text-center outline-none">
            </div>
            <button id="start-btn" class="bg-blue-600 px-6 py-2 rounded text-xs font-black hover:bg-blue-500">LAUNCH 🚀</button>
        </div>
    </header>

    <main class="flex-1 flex gap-4 p-4 overflow-hidden">
        <div id="panel-3B" class="flex-1 bg-gray-900 rounded-xl border border-gray-800 flex flex-col p-4 relative transition-colors duration-300">
            <div class="flex justify-between mb-2"><span class="text-[10px] font-black text-cyan-400 uppercase bg-cyan-900/30 px-2 py-1 rounded">Qwen-3B</span><div id="reward-3B" class="text-lg font-black"></div></div>
            <div class="flex-1 flex gap-4 overflow-hidden">
                <div id="scr-3B" class="w-2/5 bg-gray-100 text-black p-3 rounded screen-box overflow-y-auto border border-gray-300 shadow-inner"></div>
                <div class="w-3/5 flex flex-col gap-2">
                    <span class="text-[9px] font-bold text-gray-500 uppercase">Retrieved Skills (Green if mentioned in thinking)</span>
                    <div id="sk-3B" class="min-h-[40px] max-h-[80px] bg-black border border-gray-800 rounded p-2 flex flex-wrap gap-1 overflow-y-auto content-start"></div>
                    <div id="th-3B" class="flex-1 bg-black rounded p-3 text-sm italic text-gray-400 overflow-y-auto border border-gray-800 leading-relaxed"></div>
                    <div id="act-3B" class="h-14 bg-cyan-900 text-cyan-100 flex items-center justify-center font-black rounded border border-cyan-800 text-lg uppercase shadow"></div>
                </div>
            </div>
        </div>
        <div id="panel-7B" class="flex-1 bg-gray-900 rounded-xl border border-gray-800 flex flex-col p-4 relative transition-colors duration-300">
            <div class="flex justify-between mb-2"><span class="text-[10px] font-black text-fuchsia-400 uppercase bg-fuchsia-900/30 px-2 py-1 rounded">Qwen-7B</span><div id="reward-7B" class="text-lg font-black"></div></div>
            <div class="flex-1 flex gap-4 overflow-hidden">
                <div id="scr-7B" class="w-2/5 bg-gray-100 text-black p-3 rounded screen-box overflow-y-auto border border-gray-300 shadow-inner"></div>
                <div class="w-3/5 flex flex-col gap-2">
                    <span class="text-[9px] font-bold text-gray-500 uppercase">Retrieved Skills (Green if mentioned in thinking)</span>
                    <div id="sk-7B" class="min-h-[40px] max-h-[80px] bg-black border border-gray-800 rounded p-2 flex flex-wrap gap-1 overflow-y-auto content-start"></div>
                    <div id="th-7B" class="flex-1 bg-black rounded p-3 text-sm italic text-gray-400 overflow-y-auto border border-gray-800 leading-relaxed"></div>
                    <div id="act-7B" class="h-14 bg-fuchsia-900 text-fuchsia-100 flex items-center justify-center font-black rounded border border-fuchsia-800 text-lg uppercase shadow"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="h-28 bg-gray-900 border-t border-gray-800 p-4 flex gap-4">
        <div class="w-48 flex flex-col justify-center border-r border-gray-800 pr-4">
            <span class="text-xs font-black text-gray-500 uppercase">Skill Heatmap</span>
            <span class="text-[9px] text-gray-600">Actual usage leading to Success</span>
        </div>
        <div id="heatmap" class="flex-1 flex gap-2 items-end overflow-x-auto pb-2"></div>
    </footer>

    <script>
        let allTasks = [], viewIndex = 0, isReviewMode = false, ws = null;

        const updateUI = (model, data, r=null) => {
            document.getElementById(`scr-${model}`).innerText = data.screen;
            document.getElementById(`th-${model}`).innerText = data.think;
            document.getElementById(`act-${model}`).innerText = data.action;

            // 技能高亮逻辑
            const usedSet = new Set(data.used_skills || []);
            document.getElementById(`sk-${model}`).innerHTML = (data.skills || []).map(s => {
                const color = usedSet.has(s) ? 'bg-green-900 text-green-300 border-green-600' : 'bg-gray-800 text-gray-400 border-gray-700';
                return `<span class='${color} text-[9px] px-1.5 py-0.5 rounded border'>${s}</span>`;
            }).join('');

            if (r !== null) {
                const rDiv = document.getElementById(`reward-${model}`);
                rDiv.innerText = r >= 10 ? "SUCCESS 🏅" : "FAILED ❌";
                rDiv.className = r >= 10 ? "text-green-500 text-lg font-black" : "text-red-500 text-lg font-black";
                const pDiv = document.getElementById(`panel-${model}`);
                pDiv.style.borderColor = r >= 10 ? '#22c55e' : '#ef4444';
            }
        };

        document.getElementById('start-btn').onclick = () => {
            const num = document.getElementById('num-tasks').value;
            allTasks = []; viewIndex = 0;
            document.getElementById('status-bar').innerText = `Batch of ${num} starting...`;
            ['3B', '7B'].forEach(m => document.getElementById(`panel-${m}`).style.borderColor = '#1f2937');

            const ws_protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${ws_protocol}//${window.location.host}/ws/arena`);
            ws.onopen = () => ws.send(JSON.stringify({num_tasks: parseInt(num)}));
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'task_start') document.getElementById('status-bar').innerText = `Running Task ${msg.current}/${msg.total}: ${msg.task.substring(0, 50)}...`;
                if (msg.type === 'live_step_update' && !isReviewMode) updateUI(msg.model, msg.data);
                if (msg.type === 'history_entry') {
                    allTasks.push(msg.data);
                    updateHeatmap(msg.stats);
                    if (!isReviewMode) { viewIndex = allTasks.length - 1; renderTask(msg.data); }
                    document.getElementById('page-info').innerText = `${viewIndex + 1}/${allTasks.length}`;
                }
            };
        };

        function renderTask(task) {
            if (!task) return;
            ['3B','7B'].forEach(m => {
                const steps = task.steps[m];
                updateUI(m, steps[steps.length - 1], task.final_reward[m]);
            });
            document.getElementById('page-info').innerText = `${viewIndex + 1}/${allTasks.length}`;
        }

        function updateHeatmap(stats) {
            const h = document.getElementById('heatmap');
            h.innerHTML = '';
            const skills = new Set([...Object.keys(stats['3B'].skill_usage), ...Object.keys(stats['7B'].skill_usage)]);
            skills.forEach(s => {
                const s3 = stats['3B'].skill_usage[s] || 0, s7 = stats['7B'].skill_usage[s] || 0;
                h.innerHTML += `<div class="flex-1 min-w-[30px] max-w-[50px] flex items-end gap-1 relative group" style="height: 60px">
                    <div class="flex-1 w-full bg-cyan-600 rounded-t" style="height: ${s3*8}px"></div>
                    <div class="flex-1 w-full bg-fuchsia-600 rounded-t" style="height: ${s7*8}px"></div>
                    <div class="hidden group-hover:block absolute -top-10 bg-white text-black text-[9px] p-2 rounded z-50 whitespace-nowrap shadow-xl border border-gray-300"><b>${s}</b><br>3B: ${s3} | 7B: ${s7}</div>
                </div>`;
            });
        }

        document.getElementById('prev-btn').onclick = () => { if (viewIndex > 0) { viewIndex--; renderTask(getFiltered()[viewIndex]); } };
        document.getElementById('next-btn').onclick = () => { if (viewIndex < getFiltered().length - 1) { viewIndex++; renderTask(getFiltered()[viewIndex]); } };
        const getFiltered = () => document.getElementById('filter-fail').checked ? allTasks.filter(t => t.final_reward['3B'] < 10 || t.final_reward['7B'] < 10) : allTasks;

        document.getElementById('mode-review').onclick = () => { isReviewMode = true; document.getElementById('mode-review').className = "px-4 py-1 text-xs font-bold active-tab"; document.getElementById('mode-live').className = "px-4 py-1 text-xs font-bold text-gray-500"; };
        document.getElementById('mode-live').onclick = () => { isReviewMode = false; document.getElementById('mode-live').className = "px-4 py-1 text-xs font-bold active-tab"; document.getElementById('mode-review').className = "px-4 py-1 text-xs font-bold text-gray-500"; };
    </script>
</body>
</html>
