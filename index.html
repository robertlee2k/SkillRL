<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Arena Debugger v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 4px solid #3b82f6; color: white; background: #1e293b; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .success-glow { border: 2px solid #22c55e !important; box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .fail-glow { border: 2px solid #ef4444 !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        .screen-text { font-family: 'ui-monospace', 'SFMono-Regular', monospace; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body class="bg-black text-gray-200 h-screen flex flex-col overflow-hidden font-sans">

    <header class="p-4 bg-gray-900 border-b border-gray-800 flex justify-between items-center shadow-xl">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 p-2 rounded-lg">🚀</div>
            <div>
                <h1 class="text-lg font-black tracking-tighter text-white">SKILL-RL ARENA</h1>
                <p id="status-bar" class="text-[10px] text-gray-500 font-mono uppercase">Initializing...</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <div class="flex bg-black border border-gray-700 rounded-lg p-1 mr-4">
                <button id="mode-live" class="px-4 py-1.5 rounded-md text-xs font-bold transition-all active-tab">LIVE</button>
                <button id="mode-review" class="px-4 py-1.5 rounded-md text-xs font-bold transition-all text-gray-500">REVIEW</button>
            </div>
            <label class="flex items-center gap-2 text-[10px] font-bold text-gray-400 bg-gray-800 px-3 py-2 rounded-lg cursor-pointer">
                <input type="checkbox" id="filter-fail" class="w-3 h-3 accent-red-500"> FAILURES ONLY
            </label>
            <div class="flex gap-1 bg-gray-800 p-1 rounded-lg border border-gray-700">
                <button id="prev-btn" class="px-3 py-1 bg-gray-700 rounded hover:bg-blue-600 transition disabled:opacity-20">◀</button>
                <span id="page-info" class="text-xs font-mono self-center px-4 min-w-[100px] text-center uppercase tracking-tighter">TASK 0/0</span>
                <button id="next-btn" class="px-3 py-1 bg-gray-700 rounded hover:bg-blue-600 transition disabled:opacity-20">▶</button>
            </div>
            <div class="flex items-center gap-2 bg-gray-800 px-3 py-1.5 rounded-lg">
                <span class="text-[10px] text-blue-400 font-black">NUM:</span>
                <input type="number" id="num-tasks" value="10" class="bg-transparent text-white font-bold w-10 focus:outline-none">
            </div>
            <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-black transition-all">LAUNCH</button>
        </div>
    </header>

    <main class="flex-1 flex gap-4 p-4 overflow-hidden">
        <div id="panel-3B" class="flex-1 bg-gray-900 rounded-2xl border border-gray-800 flex flex-col p-4 relative transition-all duration-300">
            <div class="flex justify-between items-center mb-3">
                <span class="px-3 py-1 bg-cyan-950 text-cyan-400 text-[10px] font-black rounded-full border border-cyan-800">QWEN-3B</span>
                <div id="reward-3B" class="text-xl font-black"></div>
            </div>
            <div class="flex-1 flex gap-4 overflow-hidden">
                <div id="scr-3B" class="w-2/5 bg-white rounded-xl text-black p-3 text-[11px] overflow-y-auto screen-text"></div>
                <div class="w-3/5 flex flex-col gap-3">
                    <div id="sk-3B" class="h-14 bg-black border border-gray-800 rounded-lg p-2 text-[10px] text-orange-400 overflow-y-auto flex flex-wrap gap-1 content-start"></div>
                    <div id="th-3B" class="flex-1 bg-black rounded-xl p-4 text-sm italic text-gray-400 overflow-y-auto leading-relaxed border border-gray-800 font-serif"></div>
                    <div id="act-3B" class="h-14 bg-cyan-900 text-cyan-100 flex items-center justify-center font-black rounded-xl border border-cyan-700 text-lg"></div>
                </div>
            </div>
        </div>

        <div id="panel-7B" class="flex-1 bg-gray-900 rounded-2xl border border-gray-800 flex flex-col p-4 relative transition-all duration-300">
            <div class="flex justify-between items-center mb-3">
                <span class="px-3 py-1 bg-fuchsia-950 text-fuchsia-400 text-[10px] font-black rounded-full border border-fuchsia-800">QWEN-7B</span>
                <div id="reward-7B" class="text-xl font-black"></div>
            </div>
            <div class="flex-1 flex gap-4 overflow-hidden">
                <div id="scr-7B" class="w-2/5 bg-white rounded-xl text-black p-3 text-[11px] overflow-y-auto screen-text"></div>
                <div class="w-3/5 flex flex-col gap-3">
                    <div id="sk-7B" class="h-14 bg-black border border-gray-800 rounded-lg p-2 text-[10px] text-orange-400 overflow-y-auto flex flex-wrap gap-1 content-start"></div>
                    <div id="th-7B" class="flex-1 bg-black rounded-xl p-4 text-sm italic text-gray-400 overflow-y-auto leading-relaxed border border-gray-800 font-serif"></div>
                    <div id="act-7B" class="h-14 bg-fuchsia-900 text-fuchsia-100 flex items-center justify-center font-black rounded-xl border border-fuchsia-700 text-lg"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="h-32 bg-gray-900 border-t border-gray-800 p-4 flex gap-8">
        <div class="w-48 border-r border-gray-800 flex flex-col justify-center">
            <span class="text-xs font-black text-gray-400 uppercase tracking-widest">Skill Heatmap</span>
            <div class="flex gap-2 mt-2">
                <div class="w-2 h-2 bg-cyan-500 rounded-full"></div><span class="text-[9px]">3B</span>
                <div class="w-2 h-2 bg-fuchsia-500 rounded-full"></div><span class="text-[9px]">7B</span>
            </div>
        </div>
        <div id="heatmap-container" class="flex-1 flex gap-2 items-end pb-2 overflow-x-auto"></div>
    </footer>

    <script>
        let allTasks = [];
        let viewIndex = 0;
        let isReviewMode = false;
        let ws = null;

        const setStatus = (txt) => document.getElementById('status-bar').innerText = txt;

        function updatePanel(model, data, reward=null) {
            document.getElementById(`scr-${model}`).innerText = data.screen;
            document.getElementById(`th-${model}`).innerText = data.think;
            document.getElementById(`act-${model}`).innerText = data.action;
            document.getElementById(`sk-${model}`).innerHTML = data.skills.map(s =>
                `<span class='bg-blue-900/40 text-blue-300 border border-blue-700 px-1.5 py-0.5 rounded text-[9px] font-mono'>${s}</span>`
            ).join('');

            if (reward !== null) {
                const rDiv = document.getElementById(`reward-${model}`);
                const pDiv = document.getElementById(`panel-${model}`);
                rDiv.innerText = reward === 10 ? "SUCCESS 🏅" : "FAILED ❌";
                rDiv.className = reward === 10 ? "text-xl font-black text-green-500" : "text-xl font-black text-red-500";
                pDiv.className = reward === 10 ? pDiv.className.replace(/fail-glow|border-gray-800/g, '') + " success-glow" : pDiv.className.replace(/success-glow|border-gray-800/g, '') + " fail-glow";
            }
        }

        document.getElementById('start-btn').onclick = () => {
            const num = document.getElementById('num-tasks').value;
            allTasks = []; viewIndex = 0;
            const ws_protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${ws_protocol}//${window.location.host}/ws/arena`);

            ws.onopen = () => ws.send(JSON.stringify({ num_tasks: parseInt(num) }));
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'task_start') setStatus(`Running Task ${msg.current}/${msg.total}: ${msg.task.substring(0,50)}...`);

                if (msg.type === 'live_step_update' && !isReviewMode) {
                    updatePanel(msg.model, msg.data);
                }

                if (msg.type === 'history_entry') {
                    allTasks.push(msg.data);
                    updateHeatmap(msg.stats);
                    if (!isReviewMode) {
                        viewIndex = allTasks.length - 1;
                        renderTask(msg.data);
                    }
                    document.getElementById('page-info').innerText = `TASK ${viewIndex + 1} / ${allTasks.length}`;
                }
            };
        };

        function renderTask(task) {
            if (!task) return;
            ['3B', '7B'].forEach(m => {
                const lastStep = task.steps[m][task.steps[m].length - 1];
                updatePanel(m, lastStep, task.final_reward[m]);
            });
            document.getElementById('page-info').innerText = `TASK ${viewIndex + 1} / ${allTasks.length}`;
        }

        function updateHeatmap(stats) {
            const container = document.getElementById('heatmap-container');
            container.innerHTML = '';
            const allSkills = new Set([...Object.keys(stats['3B'].skill_usage), ...Object.keys(stats['7B'].skill_usage)]);
            allSkills.forEach(s => {
                const s3 = stats['3B'].skill_usage[s] || 0;
                const s7 = stats['7B'].skill_usage[s] || 0;
                const h = Math.max(s3, s7, 1) * 8;
                container.innerHTML += `<div class="flex-1 min-w-[30px] flex items-end gap-1 relative group" style="height: ${h+20}px">
                    <div class="flex-1 bg-cyan-600" style="height: ${s3*8}px"></div>
                    <div class="flex-1 bg-fuchsia-600" style="height: ${s7*8}px"></div>
                    <div class="hidden group-hover:block absolute -top-8 left-0 bg-white text-black text-[8px] p-1 rounded z-50 whitespace-nowrap">${s}: 3B(${s3}) 7B(${s7})</div>
                </div>`;
            });
        }

        document.getElementById('prev-btn').onclick = () => {
            const list = getFiltered();
            if (viewIndex > 0) { viewIndex--; renderTask(list[viewIndex]); }
        };
        document.getElementById('next-btn').onclick = () => {
            const list = getFiltered();
            if (viewIndex < list.length - 1) { viewIndex++; renderTask(list[viewIndex]); }
        };

        const getFiltered = () => document.getElementById('filter-fail').checked ? allTasks.filter(t => t.final_reward['3B'] < 10 || t.final_reward['7B'] < 10) : allTasks;

        document.getElementById('mode-review').onclick = () => {
            isReviewMode = true;
            document.getElementById('mode-review').classList.add('active-tab');
            document.getElementById('mode-live').classList.remove('active-tab');
        };
        document.getElementById('mode-live').onclick = () => {
            isReviewMode = false;
            document.getElementById('mode-live').classList.add('active-tab');
            document.getElementById('mode-review').classList.remove('active-tab');
        };
    </script>
</body>
</html>
