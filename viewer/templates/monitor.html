{% extends "base.html" %}

{% block title %}Monitor - Playbook Viewer{% endblock %}

{% block content %}
<h1>Training Monitor</h1>

<div class="config-section">
    <label>Log Directory:</label>
    <input type="text" id="log-dir" value="{{ log_dir }}">
    <button onclick="updateLogDir()">Update</button>
</div>

<div class="training-status" id="training-status">
    <h2>Training Status</h2>
    <div class="status-grid">
        <div class="status-item">
            <span class="label">Log Dir:</span>
            <span id="status-log-dir">-</span>
        </div>
        <div class="status-item">
            <span class="label">Current Step:</span>
            <span id="status-step">-</span>
        </div>
        <div class="status-item">
            <span class="label">Log Exists:</span>
            <span id="status-exists">-</span>
        </div>
    </div>
    <div id="recent-metrics"></div>
    <div id="recent-playbooks"></div>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <h3>Total Playbooks</h3>
        <div class="stat-value" id="total-playbooks">-</div>
    </div>
    <div class="stat-card">
        <h3>Order Rate</h3>
        <div class="stat-value" id="order-rate">-</div>
    </div>
    <div class="stat-card">
        <h3>Avg Nodes</h3>
        <div class="stat-value" id="avg-nodes">-</div>
    </div>
</div>

<div class="charts">
    <div class="chart-section">
        <h2>Scenario Distribution</h2>
        <div id="scenario-dist"></div>
    </div>

    <div class="chart-section">
        <h2>Top 10 Skills</h2>
        <div id="top-skills"></div>
    </div>
</div>

<div class="config-section">
    <label>Refresh Interval:</label>
    <select id="refresh-interval">
        <option value="5000" selected>5 seconds</option>
        <option value="10000">10 seconds</option>
        <option value="30000">30 seconds</option>
        <option value="60000">1 minute</option>
    </select>
</div>

<script>
let refreshIntervalId = null;

async function loadStats() {
    try {
        const resp = await fetch('/api/monitor/stats');
        const data = await resp.json();

        document.getElementById('total-playbooks').textContent = data.total_playbooks.toLocaleString();
        document.getElementById('order-rate').textContent = (data.order_rate * 100).toFixed(1) + '%';
        document.getElementById('avg-nodes').textContent = data.avg_nodes;

        // Scenario distribution
        const maxScenario = Math.max(...Object.values(data.scenario_distribution));
        const scenarioHtml = Object.entries(data.scenario_distribution)
            .map(([k, v]) => `<div class="bar-row"><span title="${k}">${k}</span><div class="bar" style="width: ${v / maxScenario * 100}%"></div><span>${v}</span></div>`)
            .join('');
        document.getElementById('scenario-dist').innerHTML = scenarioHtml;

        // Top skills
        const skillsHtml = data.top_skills.length > 0
            ? data.top_skills
                .map(([skill, count]) => {
                    const maxCount = data.top_skills[0][1];
                    return `<div class="bar-row"><span title="${skill}">${skill}</span><div class="bar" style="width: ${count / maxCount * 100}%"></div><span>${count}</span></div>`;
                })
                .join('')
            : '<p style="color: #6b7280">No skills found</p>';
        document.getElementById('top-skills').innerHTML = skillsHtml;
    } catch (e) {
        console.error('Failed to load stats:', e);
    }
}

async function loadTrainingStatus() {
    try {
        const logDir = document.getElementById('log-dir').value;
        const resp = await fetch(`/api/monitor/training-status?log_dir=${encodeURIComponent(logDir)}`);
        const data = await resp.json();

        document.getElementById('status-log-dir').textContent = data.log_dir;
        document.getElementById('status-step').textContent = data.current_step?.toLocaleString() || 'N/A';
        document.getElementById('status-exists').textContent = data.log_exists ? 'Yes' : 'No';
        document.getElementById('status-exists').style.color = data.log_exists ? '#10b981' : '#f43f5e';

        // Recent metrics
        if (data.recent_metrics && data.recent_metrics.length > 0) {
            const metricsHtml = data.recent_metrics.slice(-5).map(m =>
                `<div class="metric-item"><strong>${m.tag}:</strong> ${m.value?.toFixed(4) || 'N/A'} <span style="color: #6b7280">(step ${m.step})</span></div>`
            ).join('');
            document.getElementById('recent-metrics').innerHTML = '<h3 style="color: #f0f2f5; margin-bottom: 0.5rem">Recent Metrics</h3>' + metricsHtml;
        } else {
            document.getElementById('recent-metrics').innerHTML = '';
        }

        // Recent playbooks
        if (data.recent_playbooks && data.recent_playbooks.length > 0) {
            const pbHtml = data.recent_playbooks.slice(0, 5).map(pb =>
                `<div class="metric-item"><a href="/playbook/${pb.playbook_id}">${pb.playbook_id}</a></div>`
            ).join('');
            document.getElementById('recent-playbooks').innerHTML = '<h3 style="color: #f0f2f5; margin-bottom: 0.5rem">Recent Playbooks</h3>' + pbHtml;
        } else {
            document.getElementById('recent-playbooks').innerHTML = '';
        }
    } catch (e) {
        console.error('Failed to load training status:', e);
    }
}

function updateLogDir() {
    loadTrainingStatus();
}

function startAutoRefresh() {
    const interval = parseInt(document.getElementById('refresh-interval').value);
    if (refreshIntervalId) clearInterval(refreshIntervalId);
    refreshIntervalId = setInterval(() => {
        loadStats();
        loadTrainingStatus();
    }, interval);
}

document.getElementById('refresh-interval').addEventListener('change', startAutoRefresh);

// Initial load
loadStats();
loadTrainingStatus();
startAutoRefresh();
</script>
{% endblock %}
